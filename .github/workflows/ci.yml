name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            apps/api/pyproject.toml
            apps/worker/pyproject.toml
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e './apps/api[dev]'
          pip install -e './apps/worker[dev]'
      - name: Ruff
        run: ruff check apps/api apps/worker
      - name: Ruff format
        run: ruff format --check apps/api apps/worker
      - name: MyPy
        run: mypy apps/api/src apps/worker/src
      - name: Pytest
        run: pytest apps/api/tests apps/worker/tests
      - name: Alembic configuration
        working-directory: apps/api
        run: alembic heads

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install frontend
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier
        run: npm run format:check
      - name: TypeScript
        run: npm run typecheck
      - name: Unit tests
        run: npm run test
      - name: Build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
        run: npm run build
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: End-to-end tests
        run: npm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7

  compose-smoke:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Execute full-stack Compose smoke test
        run: bash ./scripts/smoke-test-compose.sh
